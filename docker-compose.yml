services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 5

  kumo:
    image: ghcr.io/sivchari/kumo:latest
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4566"]
      interval: 5s
      timeout: 3s
      retries: 5
